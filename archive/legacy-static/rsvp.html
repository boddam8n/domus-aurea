<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تأكيد الحضور</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="subpage rsvp-page">
    <main class="subpage-shell">
      <section class="subpage-card">
        <p class="kicker">تأكيد الحضور</p>
        <h1>هتنورونا؟</h1>
        <p class="intro">اضغط تأكيد، وهنعتبر حضورك متسجل.</p>
        <div class="actions">
          <button class="primary-action" id="confirmRsvp" type="button">
            أؤكد الحضور
          </button>
          <a class="secondary-action" href="index.html">
            ارجع للدعوة
          </a>
        </div>
        <p class="status" id="rsvpStatus"></p>
      </section>
    </main>
    <script>
      const button = document.querySelector("#confirmRsvp");
      const status = document.querySelector("#rsvpStatus");

      button.addEventListener("click", () => {
        localStorage.setItem("wedding-rsvp", "yes");
        status.textContent = "اتأكد حضورك، مستنيينك تنورنا.";
      });

      if (localStorage.getItem("wedding-rsvp") === "yes") {
        status.textContent = "حضورك متأكد، مستنيينك تنورنا.";
      }
    </script>
  </body>
</html>
